AutoName: PuckTrack

Description: |-
  PuckTrack is an NHL live scores app. Follow your favourite team's score in
  real time, browse the full league schedule, check team stats, leaderboards,
  standings, and the playoff bracket — all in one place.

  NOTE: PuckTrack fetches live data from the public NHL Stats API
  (api-web.nhle.com). An internet connection is required.

AntiFeatures:
  NonFreeNet: Live game data is fetched from the NHL Stats API (api-web.nhle.com),
    a proprietary third-party service.

